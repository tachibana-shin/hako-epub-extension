name: Release

on:
  push:
    tags:
      - v*.*.*
    paths:
      - package.json

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 25.8.1

      - name: Pack
        run: bun i && bun run build && bun pack && mv extension.crx chromium.crx && mv extension.xpi chromium.xpi && mv extension.zip chromium.zip && bun run build-firefox && bun pack-firefox && mv extension-firefox.crx firefox.crx && mv extension-firefox.xpi firefox.xpi && mv extension-firefox.zip firefox.zip

      - name: Generate changelog
        id: changelog
        uses: metcalfc/changelog-generator@v4.0.1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to Microsoft Edge
        uses: wdzeng/edge-addon@v2
        with:
          product-id: 9d50cc4e-2df2-4663-872c-24f83007f43b
          zip-path: chromium.zip
          api-key: ${{ secrets.EDGE_API_KEY }}
          client-id: ${{ secrets.EDGE_CLIENT_ID }}

      - name: Publish to Mozilla Firefox
        uses: wdzeng/firefox-addon@v1
        with:
          addon-guid: hako-epub@shin.is-a.dev
          xpi-path: firefox.zip
          self-hosted: false
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Release
        uses: softprops/action-gh-release@v0.1.14
        with:
          files: |
            chromium.*
            firefox.*
          body: ${{ steps.changelog.outputs.changelog }}
