name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 25.8.1

      - name: Build
        run: bun i && bun run build && bun run pack && bun run build-firefox && bun run pack-firefox

      - uses: actions/upload-artifact@v4
        with:
          name: extensions
          path: |
            chromium.zip
            firefox.zip
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1

      - uses: actions/download-artifact@v4
        with:
          name: extensions
          path: |
            chromium.zip
            firefox.zip

      - name: Publish to Mozilla Firefox
        uses: wdzeng/firefox-addon@v1
        with:
          addon-guid: hako-epub@shin.is-a.dev
          xpi-path: firefox.zip
          self-hosted: false
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Semantic Release
        run: bun run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
