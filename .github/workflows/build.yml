name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v2.3.1

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 25.8.1

      - name: Get next version
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          dry_run: true

      - name: Update package.json version
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          npm version ${{ steps.semantic.outputs.new_release_version }} --no-git-tag-version

      - name: Pack with new version
        run: bun i && bun run build && bun pack && mv extension.crx chromium.crx && mv extension.xpi chromium.xpi && mv extension.zip chromium.zip && bun run build-firefox && bun pack-firefox && mv extension-firefox.crx firefox.crx && mv extension-firefox.xpi firefox.xpi && mv extension-firefox.zip firefox.zip

      - name: Publish to Mozilla Firefox
        uses: wdzeng/firefox-addon@v1
        with:
          addon-guid: hako-epub@shin.is-a.dev
          xpi-path: firefox.zip
          self-hosted: false
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Semantic Release
        run: bun run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
