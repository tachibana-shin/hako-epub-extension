name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main

jobs:
  check:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Bun 🍞
        uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 25.8.1

      - name: Install dependencies 📦
        run: bun i

      - name: Build 🛠️
        run: bun run build

      - name: Lint 🔍
        run: bun run lint

      - name: Typecheck ⌨️
        run: bun run typecheck

      - name: Test 🧪
        run: bun run test -- --run

      # - name: Install Playwright Browsers 🎭
      #   run: bun x playwright install --with-deps

      # - name: Run E2E tests 🏁
      #   run: bun run test:e2e

